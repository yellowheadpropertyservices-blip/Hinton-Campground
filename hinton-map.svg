<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1060" width="800" height="1060">
  <defs>
    <!-- Tree symbol -->
    <g id="tree-sm">
      <circle cx="0" cy="-4" r="5" fill="#4a7a3a" opacity="0.7"/>
      <circle cx="0" cy="-4" r="3.5" fill="#5a8a4a" opacity="0.8"/>
    </g>
    <g id="tree-lg">
      <circle cx="0" cy="-5" r="8" fill="#3a6a2a" opacity="0.6"/>
      <circle cx="0" cy="-5" r="5.5" fill="#4a7a3a" opacity="0.7"/>
    </g>
    <!-- Conifer tree -->
    <g id="pine">
      <polygon points="0,-10 -5,0 5,0" fill="#3a6a2a" opacity="0.7"/>
      <polygon points="0,-7 -4,1 4,1" fill="#4a7a3a" opacity="0.8"/>
    </g>
  </defs>

  <!-- Background - parchment/natural -->
  <rect width="800" height="1060" fill="#f0e8d4" rx="0"/>
  
  <!-- Grass/ground area -->
  <ellipse cx="420" cy="480" rx="330" ry="380" fill="#c8d8a8" opacity="0.4"/>
  <ellipse cx="380" cy="520" rx="280" ry="340" fill="#b8cc98" opacity="0.3"/>
  
  <!-- Campground boundary - organic shape (rotated layout) -->
  <path d="M120,150 C160,120 280,100 350,130 C420,160 520,200 580,280 C640,360 660,480 640,560 C620,640 580,720 520,780 C460,840 380,870 300,860 C220,850 160,800 130,720 C100,640 90,540 100,440 C105,340 100,220 120,150Z" 
        fill="#8aaa6a" opacity="0.25" stroke="#6a8a4a" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Switzer Drive - diagonal road (rotated: now goes from bottom-left to upper-right area) -->
  <path d="M50,870 L150,810 Q200,780 280,720 L420,620 Q460,590 500,540 L580,440 Q610,400 620,360 L660,260 Q680,200 690,160 L720,80" 
